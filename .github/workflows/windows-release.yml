name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"
  APP_NAME: "PeekAgent"
  ARCHIVE_NAME: "PeekAgent-windows-amd64.zip"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          architecture: x64

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build application
        run: python build_win.py

      - name: Archive build output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "dist\${{ env.ARCHIVE_NAME }}" "release\${{ env.ARCHIVE_NAME }}" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: peekagent-windows-x86_64
          path: release/${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Extract latest changelog
        run: |
          awk '/^## \[/{if(p) exit; p=1} p' CHANGELOG.md > latest_changelog.txt

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: peekagent-*
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: latest_changelog.txt
          files: release-assets/**/*
          fail_on_unmatched_files: true
